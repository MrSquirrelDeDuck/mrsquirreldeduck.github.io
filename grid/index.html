<!DOCTYPE html>
<html>

    <style>

            font-family:Arial, Helvetica, sans-serif

        }
        .inner {
            flex-direction: column;
        }
        button {
            width: 45%;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="container inner">

                            <td><input type="checkbox" onclick="build()" id="48"></td>

                        </tr>
                    </table>
                    </tbody>
            </div>
            <input type="text" readonly id="output">
            <div class="container">
                <button onclick="invertAll()">Invert</button>
                <button onclick="reset()">Reset</button>
            </div>
            <hr width="75%">
            <input type="text" id="input">
            <div class="container">
                <button onclick="importCode()">Import</button>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    function build() {
        counter = 0n;
        for (i = 0; i < 49; i++) {
            counter = counter << 1n;
            if (!document.getElementById(i).checked) {
                counter = counter | 1n;
            }
        }
        document.getElementById("output").value = counter;
    }

    function invertAll() {
        for (i = 0; i < 49; i++) {
            document.getElementById(i).checked = !document.getElementById(i).checked;
        }
        build();
    }
    
    function reset() {
        for (i = 0; i < 49; i++) {
            document.getElementById(i).checked = false;
        }
        build();
    }

    function importCode() {
        code = BigInt(document.getElementById("input").value);

        for (i = 48; i >= 0; i--) {
            document.getElementById(i).checked = !Boolean(code & 1n);
            code = code / 2n;
        }
        build();
    }
    build();
</script>
